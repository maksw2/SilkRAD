name: Build and publish
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '15.9'
    - name: Restore NuGet packages
      run: nuget restore code/SilkRAD.sln
    - name: Build Debug
      run: msbuild code/SilkRAD.sln /p:Configuration=Debug
    - name: Build Release
      run: msbuild code/SilkRAD.sln /p:Configuration=Release
    - name: Publish Artifact Debug
      uses: actions/upload-artifact@v4.3.3
      with:
        name: SilkRAD Debug
        path: |
          code\x64\Debug\*.dll
          code\x64\Debug\*.exe
          code\x64\Debug\*.pdb
        if-no-files-found: 'error'
        compression-level: 0
    - name: Publish Artifact Release
      uses: actions/upload-artifact@v4.3.3
      with:
        name: SilkRAD Release
        path: |
          code\x64\Release\*.dll
          code\x64\Release\*.exe
          code\x64\Release\*.pdb
        if-no-files-found: 'error'
        compression-level: 0
