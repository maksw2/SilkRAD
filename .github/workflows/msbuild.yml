name: Build and publish
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up MSBuild and NuGet Path
      shell: pwsh
      run:
        $paths = @(
          echo "D:\vs2017\VC\Tools\MSVC\14.16.27023\bin\HostX64\x64"
          echo "D:\vs2017\Common7\IDE\VC\VCPackages"
          echo "D:\vs2017\Common7\IDE\CommonExtensions\Microsoft\TestWindow"
          echo "D:\vs2017\Common7\IDE\CommonExtensions\Microsoft\TeamFoundation\Team Explorer"
          echo "D:\vs2017\MSBuild\15.0\bin\Roslyn"
          echo "D:\vs2017\Team Tools\Performance Tools\x64"
          echo "D:\vs2017\Team Tools\Performance Tools"
          echo "C:\Program Files (x86)\Microsoft Visual Studio\Shared\Common\VSPerfCollectionTools\\x64"
          echo "C:\Program Files (x86)\Microsoft Visual Studio\Shared\Common\VSPerfCollectionTools\"
          echo "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.6.1 Tools\x64\"
          echo "C:\Program Files (x86)\HTML Help Workshop"
          echo "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64"
          echo "C:\Program Files (x86)\Windows Kits\10\bin\x64"
          echo "D:\vs2017\MSBuild\15.0\bin"
          echo "C:\Windows\Microsoft.NET\Framework64\v4.0.30319"
          echo "D:\vs2017\Common7\IDE\"
          echo "D:\vs2017\Common7\Tools\"
          echo "C:\VulkanSDK\1.4.304.0\Bin"
          echo "C:\Program Files (x86)\VMware\VMware Workstation\bin\"
          echo "C:\Program Files\Microsoft MPI\Bin\"
          echo "C:\Program Files\ImageMagick-7.1.1-Q16-HDRI"
          echo "C:\Windows\system32"
          echo "C:\Windows"
          echo "C:\Windows\System32\Wbem"
          echo "C:\Windows\System32\WindowsPowerShell\v1.0\"
          echo "C:\Windows\System32\OpenSSH\"
          echo "C:\ProgramData\chocolatey\bin"
          echo "C:\Program Files\nodejs\"
          echo "C:\Users\maksw\AppData\Local\Microsoft\WindowsApps"
          echo "C:\Program Files\Git\cmd"
          echo "C:\Program Files\PuTTY\"
          echo "C:\Program Files\CMake\bin"
          echo "C:\Program Files\NVIDIA Corporation\NVIDIA app\NvDLISR"
          echo "C:\msys64\ucrt64\bin"
          echo "C:\Program Files\7-Zip"
          echo "C:\Program Files\Certbot\bin"
          echo "C:\onpath"
          echo "C:\Program Files\Meson\"
          echo "C:\Program Files\PowerShell\7\"
          echo "C:\Program Files\Docker\Docker\resources\bin"
          echo "C:\php"
          echo "C:\ProgramData\ComposerSetup\bin"
          echo "C:\Users\maksw\AppData\Roaming\Composer\vendor\bin"
          echo "D:\vs2017\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin"
          echo "D:\vs2017\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja"
          echo "C:\Users\maksw\AppData\Local\AzureFunctionsTools\Releases\1.13.2\cli_x64"
        )

        foreach ($path in $paths) {
            Add-Content -Path $env:GITHUB_PATH -Value $path
        }
    - name: Build Debug
      shell: cmd
      run: |
        cd D:\actions-runner\_work\SilkRAD\SilkRAD\code
        msbuild SilkRAD.sln /p:Configuration=Debug
    - name: Build Release
      shell: cmd
      run: |
        cd D:\actions-runner\_work\SilkRAD\SilkRAD\code
        msbuild SilkRAD.sln /p:Configuration=Release
    - name: Publish Artifact Debug
      uses: actions/upload-artifact@v4.6.2
      with:
        name: SilkRAD Debug
        path: |
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Debug\*.dll'
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Debug\*.exe'
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Debug\*.pdb'
        # it already is my pc only so what do i care
        if-no-files-found: 'error'
        compression-level: 0
    - name: Publish Artifact Release
      uses: actions/upload-artifact@v4.6.2
      with:
        name: SilkRAD Release
        path: |
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Release\*.dll'
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Release\*.exe'
          'D:\actions-runner\_work\SilkRAD\SilkRAD\code\x64\Release\*.pdb'
        if-no-files-found: 'error'
        compression-level: 0
